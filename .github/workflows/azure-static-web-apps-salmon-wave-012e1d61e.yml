name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─── Job 1: Cypress E2E tests ──────────────────────────────────────────────
  cypress:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Start Angular app and run Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          start: npx ng serve --configuration development
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 60
          browser: chrome
        env:
          CYPRESS_baseUrl: http://localhost:4200

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore

  # ─── Job 2: Build and deploy ───────────────────────────────────────────────
  build_and_deploy_job:
    name: Build and Deploy Job
    runs-on: ubuntu-latest
    needs: cypress   # ← blocks deploy if any Cypress test fails
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_WAVE_012E1D61E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: "api"
          output_location: "dist/frontend/browser"

  # ─── Job 3: Smoke test against live site ──────────────────────────────────
  smoke_test:
    name: Live Site Smoke Test
    runs-on: ubuntu-latest
    needs: build_and_deploy_job  # ← only runs after successful deploy
    if: github.event_name == 'push'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run smoke tests against live site
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          spec: |
            cypress/e2e/upload.cy.ts
            cypress/e2e/history.cy.ts
        env:
          # Points at the real deployed site instead of localhost
          CYPRESS_baseUrl: https://salmon-wave-012e1d61e.7.azurestaticapps.net

      - name: Upload smoke test screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-test-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore

  # ─── Job 4: Close PR environment ──────────────────────────────────────────
  close_pull_request_job:
    name: Close Pull Request Job
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_WAVE_012E1D61E }}
          action: "close"
